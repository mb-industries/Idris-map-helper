name: Build and deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # the default token now needs write permission to push to gh-pages
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./dist
          publish_branch: gh-pages
          # use the built-in GITHUB_TOKEN (safer than a PAT) or set
          # GH_PAGES_PAT with repo scope if you prefer a personal token
          github_token: ${{ secrets.GITHUB_TOKEN }}}]}
